---
    name: Build and Push a Docker Image and a Python Package
    on:
      push:
        branches: [ main ]
        tags: [ 'v*' ]
    env:
      IMAGE_NAME: telegram-notify-bot
    jobs:
      python-test:
        runs-on: ubuntu-latest
        permissions:
          id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
          contents: read
          packages: write
          security-events: write
          actions: read  # Required for CodeQL upload-sarif action
          checks: write  # Required for publishing test results
          pull-requests: write  # Required for PR comments
        steps:
          - name: Checkout code
            uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6
            with:
              fetch-tags: true
              fetch-depth: 0
          - name: Set up Python
            uses: 'actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405' # v6
            with:
              python-version-file: "pyproject.toml"
          - name: Install uv
            uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
            with:
              version: "0.9.17"
              enable-cache: true
          - name: Build python package
            run: |
              uv venv
              source .venv/bin/activate
              uv build
          - name: Test python package
            id: test
            run: |
              source .venv/bin/activate
              uv pip install -e ".[dev]"
              uv run pytest tests/

              echo "REGISTRY=${GITHUB_SERVER_URL#https://}" >> $GITHUB_ENV
              echo "UV_PUBLISH_USERNAME=${{ github.repository_owner }}" >> $GITHUB_ENV
              PUBLISH_CHECK_URL="${{ github.server_url }}"
              USERNAME="${{ github.repository_owner }}"
              echo "UV_PUBLISH_CHECK_URL=https://${USERNAME,,}:${{ secrets.REGISTRY_TOKEN }}@${PUBLISH_CHECK_URL#https://}/api/packages/${{ github.repository_owner }}/pypi/simple" >> $GITHUB_ENV
              echo "UV_PUBLISH_URL=${{ github.server_url }}/api/packages/${{ github.repository_owner }}/pypi" >> $GITHUB_ENV
          - name: Publish package to Gitea Package Registry with UV
            run: |
              source .venv/bin/activate
              # Configure UV for Gitea Package Registry https://docs.astral.sh/uv/reference/environment/#uv_publish_url
              export UV_PUBLISH_PASSWORD="${{ secrets.REGISTRY_TOKEN }}"
              export UV_INSECURE_NO_ZIP_VALIDATION="true"
              uv publish
      build-and-push:
        runs-on: ubuntu-latest
        needs: python-test
        permissions:
          id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
          contents: read
          packages: write
          security-events: write
          actions: read  # Required for CodeQL upload-sarif action
          checks: write  # Required for publishing test results
          pull-requests: write  # Required for PR comments
        steps:
          - name: Checkout code
            uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6
            with:
              fetch-tags: true
              fetch-depth: 0
          - name: Set up QEMU
            uses: 'docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130' # v3
          - name: Set up Docker Buildx
            uses: 'docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f' # v3
            with:
              install: true
              use: true
              name: ci-builder
          - name: Set up Python
            uses: 'actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405' # v6
            with:
              python-version-file: "pyproject.toml"
          - name: Install uv
            uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
            with:
              version: "0.9.17"
              enable-cache: true
          - name: Login to Gitea Container Registry
            uses: 'docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9' # v3
            with:
              registry: ${{ github.server_url }}
              username: '${{ github.repository_owner }}'
              password: '${{ secrets.REGISTRY_TOKEN }}'
          - name: Set Env Variables
            run: |
              uv venv
              source .venv/bin/activate
              uv pip install -e "."
              echo "REGISTRY=${GITHUB_SERVER_URL#https://}" >> $GITHUB_ENV
              echo "VCS_VERSION=$(python -c 'from notify_bot._version import __version__; print(__version__)')" >> $GITHUB_ENV
              echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          - name: Extract metadata
            id: meta
            uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
            with:
              images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}
              tags: |
                type=ref,event=branch
                type=ref,event=pr
                type=semver,pattern={{version}}
                type=semver,pattern={{major}}.{{minor}}
                type=sha,prefix=sha-
                type=raw,value=latest,enable={{is_default_branch}}
                type=raw,${{ env.VCS_VERSION }},prefix=vcs
          - name: Build and push Docker image
            id: build
            uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
            with:
              context: .
              platforms: linux/amd64,linux/arm64
              push: ${{ github.event_name != 'pull_request' }}
              tags: ${{ steps.meta.outputs.tags }}
              labels: ${{ steps.meta.outputs.labels }}
              target: production
              cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}:buildcache
              cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
              build-args: |
                BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
                VCS_REF=${{ github.sha }}
                VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
