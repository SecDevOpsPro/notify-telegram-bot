---
    name: Build and Push a Docker Image and a Python Package
    on:
      push:
        branches:
          - main
    env:
      IMAGE_NAME: telegram-notify-bot
    jobs:
      build-and-push:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: 'https://github.com/actions/checkout@v3'
          - name: Set up QEMU
            uses: 'https://github.com/docker/setup-qemu-action@v2'
          - name: Set up Docker Buildx
            uses: 'https://github.com/docker/setup-buildx-action@v2'
          - name: Set up Python
            uses: 'https://github.com/actions/setup-python@v4'
            with:
              python-version: '3.10'
              cache: pip
          - name: Build python package
            run: |
              python --version ; pip --version  # For debugging
              pip install virtualenv
              virtualenv venv
              source venv/bin/activate
              python -m pip install --upgrade twine build
              python -m build
          - name: Publish package to Gitea Package Registry
            uses: 'https://github.com/pypa/gh-action-pypi-publish@v1.10.1'
            with:
              verbose: true
              skip-existing: true
              user: ${{ github.repository_owner }}
              password: ${{ secrets.REGISTRY_TOKEN }}
              repository-url: https://gitea.dxas90.work/api/packages/${{ github.repository_owner }}/pypi
          - name: Login to Gitea Container Registry
            uses: 'https://github.com/docker/login-action@v3'
            with:
              registry: gitea.dxas90.work
              username: '${{ github.repository_owner }}'
              password: '${{ secrets.REGISTRY_TOKEN }}'
          - name: Build Docker image
            uses: 'https://github.com/docker/build-push-action@v6'
            with:
              context: .
              push: true
              tags: |
                gitea.dxas90.work/${{ github.repository_owner }}/${{ env.IMAGE_NAME}}:rc-release
                gitea.dxas90.work/${{ github.repository_owner }}/${{ env.IMAGE_NAME}}:${{ github.sha }}
