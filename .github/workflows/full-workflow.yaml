---
    name: Build and Push a Docker Image and a Python Package
    on:
      push:
        branches:
          - main
    env:
      IMAGE_NAME: telegram-notify-bot
    jobs:
      build-and-push:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: 'https://github.com/actions/checkout@v3'
          - name: Get Git commit timestamps
            run: echo "TIMESTAMP=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV
          - name: Set up QEMU
            uses: 'https://github.com/docker/setup-qemu-action@v3'
          - name: Set up Docker Buildx
            uses: 'https://github.com/docker/setup-buildx-action@v3'
          - name: Set up Python
            uses: 'https://github.com/actions/setup-python@v4'
            with:
              python-version: '3.10'
              cache: pip
          - name: Build python package
            run: |
              python --version ; pip --version  # For debugging
              pip install virtualenv
              virtualenv venv
              source venv/bin/activate
              python -m pip install --upgrade twine build
              python -m build
          - name: Publish package to Gitea Package Registry
            uses: 'https://github.com/pypa/gh-action-pypi-publish@v1.10.1'
            with:
              verbose: true
              skip-existing: true
              user: ${{ github.repository_owner }}
              password: ${{ secrets.REGISTRY_TOKEN }}
              repository-url: https://gitea.dxas90.work/api/packages/${{ github.repository_owner }}/pypi
          - name: Docker meta
            id: meta
            uses: 'https://github.com/docker/metadata-action@v5'
            with:
              # list of Docker images to use as base name for tags
              images: |
                gitea.dxas90.work/${{ github.repository_owner }}/${{ env.IMAGE_NAME}}
              # generate Docker tags based on the following events/attributes
              tags: |
                type=schedule
                type=ref,event=branch
                type=ref,event=pr
                type=semver,pattern={{version}}
                type=semver,pattern={{major}}.{{minor}}
                type=semver,pattern={{major}}
                type=sha
          - name: Login to Gitea Container Registry
            uses: 'https://github.com/docker/login-action@v3'
            with:
              registry: gitea.dxas90.work
              username: '${{ github.repository_owner }}'
              password: '${{ secrets.REGISTRY_TOKEN }}'
          - name: Login to Docker Hub
            uses: 'https://github.com/docker/login-action@v3'
            with:
              username: '${{ github.repository_owner }}'
              password: ${{ secrets.DOCKERHUB_TOKEN }}
          - name: Login to GitHub Container Registry
            uses: 'https://github.com/docker/login-action@v3'
            with:
              registry: ghcr.io
              username: '${{ github.repository_owner }}'
              password: ${{ secrets.THE_GITHUB_TOKEN }}
          - name: Build Docker image
            uses: 'https://github.com/docker/build-push-action@v6'
            with:
              context: .
              platforms: linux/amd64,linux/arm64
              push: true
              tags: ${{ steps.meta.outputs.tags }}
              labels: ${{ steps.meta.outputs.labels }}
              annotations: ${{ steps.meta.outputs.annotations }}
              build-args: |
                COMMIT_HASH=${{ github.sha }}
                CREATED="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
                GH_ACCESS_TOKEN=${{ secrets.REGISTRY_TOKEN }}
              secrets: |
                GIT_AUTH_TOKEN=${{ secrets.REGISTRY_TOKEN }}
              env:
                SOURCE_DATE_EPOCH: '${{ env.TIMESTAMP }}'

