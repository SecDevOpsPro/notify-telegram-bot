version: "3.7"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
      pull: true
      platforms:
        - "linux/amd64"
        - "linux/arm64"
      args:
        - COMMIT_HASH=${COMMIT_HASH:-}
      tags:
        - "notify-tg-bot:latest"
    image: notify-tg-bot
    env_file:
      - .env
    volumes:
      - ./:/app
  redis_cache:
    image: redis:alpine@sha256:2afba59292f25f5d1af200496db41bea2c6c816b059f57ae74703a50a03a27d0
    env_file:
      - .env
