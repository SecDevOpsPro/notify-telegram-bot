version: "3.7"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
      pull: true
      platforms:
        - "linux/amd64"
        - "linux/arm64"
      args:
        - COMMIT_HASH=${COMMIT_HASH:-}
      tags:
        - "notify-tg-bot:latest"
    image: notify-tg-bot
    env_file:
      - .env
    environment:
      # Required
      - TOKEN=${TOKEN}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}
      # Optional — defaults shown
      - DATABASE_PATH=${DATABASE_PATH:-/app/data/bot.db}
      - DAILY_REPORT_TIME=${DAILY_REPORT_TIME:-08:00}
      - LOGLEVEL=${LOGLEVEL:-INFO}
      # Proxy — set to route traffic through FlareSolverr or any HTTP proxy
      # e.g. HTTP_PROXY=http://flaresolverr:8191
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
    volumes:
      - ./data:/app/data   # persists SQLite database between restarts
