version: "3.7"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
      pull: true
      platforms:
        - "linux/amd64"
        - "linux/arm64"
      args:
        - COMMIT_HASH=${COMMIT_HASH:-}
      tags:
        - "notify-tg-bot:latest"
    image: notify-tg-bot
    env_file:
      - .env
    volumes:
      - ./:/app
  redis_cache:
    image: redis:alpine@sha256:4eec4565e45aa0b3966554c866bc73211e281b0b3d89fe9a33c982e6faca809d
    env_file:
      - .env
