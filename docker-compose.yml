services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - 8191
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
  app:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
      pull: true
      args:
        - COMMIT_HASH=${COMMIT_HASH:-}
      tags:
        - "notify-tg-bot:latest"
    image: notify-tg-bot
    env_file:
      - .env
    environment:
      # Required
      - TOKEN=${TOKEN}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}
      # Optional — defaults shown
      - DATABASE_PATH=${DATABASE_PATH:-/app/data/bot.db}
      - DAILY_REPORT_TIME=${DAILY_REPORT_TIME:-08:00}
      - LOGLEVEL=${LOGLEVEL:-INFO}
      # Cloudflare bypass via FlareSolverr REST API
      - FLARESOLVERR_URL=http://flaresolverr:8191
    volumes:
      - data:/app/data   # persists SQLite database between restarts
    depends_on:
      - flaresolverr
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  data:
