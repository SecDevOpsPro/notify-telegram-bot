[tools]
age = "latest"
pipx = "latest"
python = { version='3', virtualenv='.venv' }
sops = "latest"
uv = "latest"

[settings]
experimental = true
python.uv_venv_auto = true

[env]
# Use the project name derived from the current directory
PROJECT_NAME = "{{ config_root | basename }}"
# Automatic virtualenv activation
_.python.venv = { path = ".venv", create = true }

PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"
LC_ALL = "en_US.UTF-8"
LC_CTYPE = "en_US.UTF-8"
SECRET_KEY="{{ exec(command='python3 -c \"import os, base64; print(base64.b64encode(os.urandom(128)).decode())\"') }}"
HISTIGNORE="ls:ps:history:htop:df:lens:source:lens-desktop"

[tasks.tests]
description = "Run the test suite"
alias = "pytest"
run = [
  "uv run pytest tests/"
]

[tasks.format]
description = "Run the formatter"
alias = "f"
run = [
  "uv run ruff format ."
]

[tasks.upgrade]
description = "Upgrade dependencies"
alias = "pu"
run = [
  "uv lock --upgrade"
]
