[build-system]
# https://setuptools.pypa.io/en/latest/build_meta.html
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
wheel = true
sdist = true

[project]
# https://setuptools.pypa.io/en/latest/userguide/pyproject_config.html
name = "notify_bot"
version = "0.1.0"
description = "Personal telegram Bot."
license = "MIT"
readme = "README.md"
authors = ["Daniel Ramirez <dxas90@gmail.com>"]

requires-python = ">=3.9.0"

dependencies = [
  "anyio==3.6.2",
  "cachetools==5.3.0",
  "certifi==2022.12.7",
  "charset-normalizer==3.1.0",
  "h11==0.14.0",
  "h2==4.1.0",
  "hpack==4.0.0",
  "httpcore==0.16.3",
  "hyperframe==6.0.1",
  "idna==3.4",
  "python-telegram-bot==20.2",
  "requests==2.28.2",
  "rfc3986==1.5.0",
  "sniffio==1.3.0",
  "urllib3==1.26.15",
]

[project.optional-dependencies]
dev = ["black", "httpx", "pytest", "pytest-cov"]

[tool.setuptools.packages.find]
where = ["."]
include = ["notify_bot"]
exclude = ["tests"]

